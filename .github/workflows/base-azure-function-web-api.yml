name: Base Azure Function Web Api


on:
  workflow_call:
    inputs:
      PROJECT:
        required: true
        type: string
      APPENV:
        required: true
        type: string
      WORKING_DIRECTORY:
        required: true
        type: string
      AZURE_FUNCTIONAPP_PATH:
        required: true
        type: string
      AZURE_FUNCTIONAPP_SLOT:
        required: true
        type: string
      CONFIGURATION:
        required: true
        type: string
      DOTNET_VERSION:
        required: true
        type: string
      AZURE_FUNCTIONAPP_SKU:
        type: string
        default: "flexconsumption"
    secrets:
      AZURE_CREDENTIALS:
        required: true


jobs:
  build-and-deploy:
    name: Build And Deploy
    runs-on: ubuntu-latest

    env:
      RESOURCE_NAME: "${{ inputs.PROJECT }}-${{ inputs.APPENV }}"
    
    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup .NET Core ${{ inputs.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: ${{ inputs.DOTNET_VERSION }}

      - name: Restore ${{ inputs.WORKING_DIRECTORY }}
        run: dotnet restore "${{ inputs.WORKING_DIRECTORY }}"

      - name: Build And Publish ${{ inputs.WORKING_DIRECTORY }} / ${{ inputs.CONFIGURATION }} in ${{ inputs.AZURE_FUNCTIONAPP_PATH }}
        run: dotnet build "${{ inputs.WORKING_DIRECTORY }}" --configuration ${{ inputs.CONFIGURATION }} --output ${{ inputs.AZURE_FUNCTIONAPP_PATH }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy to Azure Function App ${{ inputs.PROJECT }} @ ${{ inputs.APPENV }} from ${{ inputs.AZURE_FUNCTIONAPP_PATH }}
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.RESOURCE_NAME }}
          slot-name: ${{ inputs.AZURE_FUNCTIONAPP_SLOT }}
          package: ${{ inputs.AZURE_FUNCTIONAPP_PATH }}
          sku: ${{ inputs.AZURE_FUNCTIONAPP_SKU }}
