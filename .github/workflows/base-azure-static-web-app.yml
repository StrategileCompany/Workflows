name: Base Azure Static Web App


on:
  workflow_call:
    inputs:
      Project:
        required: true
        type: string
      AppEnv:
        required: true
        type: string
      AppType:
        required: true
        type: string
      RootPath:
        required: true
        type: string
      OutPath:
        required: true
        type: string
      ApiUrl:
        required: true
        type: string
      IncludeFileToReplace:
        required: true
        type: string
    secrets:
      AZURE_CREDENTIALS:
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy 

    env:
      RG_NAME: "RG-${{ inputs.Project }}-${{ inputs.AppEnv }}"
      RESOURCE_NAME: "${{ inputs.Project }}-${{ inputs.AppEnv }}-${{ inputs.AppType }}"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Find '#{BaseAddressUrl}' in '${{ inputs.RootPath }}/${{ inputs.IncludeFileToReplace }}' and Replace to '${{ inputs.ApiUrl }}'
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "#{BaseAddressUrl}"
          replace: ${{ inputs.ApiUrl }}
          include: ${{ inputs.RootPath }}/${{ inputs.IncludeFileToReplace }}
          regex: false

      - name: Find '#{CACHE_VERSION}' in '${{ inputs.RootPath }}/wwwroot/*.*' and Replace to '${{ github.run_id }}'
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "#{CACHE_VERSION}"
          replace: ${{ github.run_id }}
          include: ${{ inputs.RootPath }}/wwwroot/*.*
          regex: false

      - name: Find '#{AppEnv}' in '${{ inputs.RootPath }}/wwwroot/manifest.webmanifest' and Replace to '${{ inputs.AppEnv }}'
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "#{APPENV}"
          replace: ${{ inputs.AppEnv }}
          include: ${{ inputs.RootPath }}/wwwroot/manifest.webmanifest
          regex: false
      
      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Obtendo o PUBLISH_TOKEN do StaticWebApp
        id: get-token
        run: |
          TOKEN=$(az staticwebapp secrets list --name $RESOURCE_NAME --resource-group $RG_NAME --query "properties.apiKey" -o tsv)     
          echo "PUBLISH_TOKEN=$TOKEN" >> $GITHUB_OUTPUT
        
      - name: Build And Deploy Blazor
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "upload"
          azure_static_web_apps_api_token: ${{ steps.get-token.outputs.PUBLISH_TOKEN }}
          app_location: ${{ inputs.RootPath }}
          app_artifact_location: ${{ inputs.OutPath }}

